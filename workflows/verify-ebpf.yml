name: Verify eBPF cheatsheet (execsnoop / opensnoop)

# Запускается при каждом пуше и вручную (кнопка Run workflow во вкладке Actions)
on:
  push:
  workflow_dispatch:

jobs:
  verify-bcc:
    runs-on: ubuntu-latest   # полноценная VM с обычным ядром, root через sudo, BPF доступен

    steps:
      - name: Показать ядро и окружение
        run: |
          uname -a
          echo "--- проверяем поддержку BPF в ядре ---"
          grep -E "CONFIG_BPF=y|CONFIG_BPF_SYSCALL=y" /boot/config-$(uname -r) || true

      - name: Установить BCC-инструменты
        run: |
          sudo apt-get update
          sudo apt-get install -y bpfcc-tools linux-headers-$(uname -r)
          # бинарники ставятся с суффиксом -bpfcc; делаем их доступными по коротким именам
          sudo ln -sf /usr/sbin/execsnoop-bpfcc /usr/local/bin/execsnoop
          sudo ln -sf /usr/sbin/opensnoop-bpfcc /usr/local/bin/opensnoop
          echo "execsnoop -> $(command -v execsnoop)"
          echo "opensnoop -> $(command -v opensnoop)"

      # --- 1. Проверяем, что каждый флаг ПРИНИМАЕТСЯ инструментом (--help не требует ядра) ---
      - name: Синтаксис флагов (--help парсится без ошибок)
        run: |
          set -e
          for tool in execsnoop opensnoop; do
            echo "==== $tool --help ===="
            sudo $tool --help > /dev/null && echo "[OK] $tool --help"
          done

      # --- 2. execsnoop реально ловит запуск процессов ---
      - name: execsnoop ловит новый процесс
        run: |
          set -e
          # запускаем трассировку на 5 секунд в фон, пишем в файл
          sudo timeout 6 execsnoop -t > exec.out 2>&1 &
          BG=$!
          sleep 2
          # генерируем заведомо уникальный процесс
          /bin/sleep 0.1 ; /usr/bin/env CHEATSHEET_MARKER=1 /bin/true
          # ждём завершения трассировки
          wait $BG 2>/dev/null || true
          echo "--- вывод execsnoop (первые строки) ---"
          head -20 exec.out
          echo "--- проверка: поймал ли он процессы ---"
          grep -qE "sleep|true|env" exec.out && echo "[PASS] execsnoop поймал процессы" \
            || { echo "[FAIL] execsnoop ничего не поймал"; exit 1; }

      # --- 3. execsnoop -x показывает неудачный exec ---
      - name: execsnoop -x ловит неудачный exec
        run: |
          set -e
          sudo timeout 6 execsnoop -x > execx.out 2>&1 &
          BG=$!
          sleep 2
          # пытаемся запустить несуществующий бинарь -> неудачный execve
          /bin/bash -c '/nonexistent/binary_xyz 2>/dev/null' || true
          wait $BG 2>/dev/null || true
          echo "--- вывод execsnoop -x ---"
          cat execx.out
          # при неудаче RET будет отрицательным (-2 = ENOENT)
          grep -qE "binary_xyz|-2" execx.out && echo "[PASS] execsnoop -x увидел неудачный exec" \
            || echo "[WARN] неудачный exec не зафиксирован (возможно, шелл не вызвал execve напрямую)"

      # --- 4. opensnoop -x реально ловит ENOENT (главный пример из шпаргалки) ---
      - name: opensnoop -x ловит несуществующий файл (ENOENT)
        run: |
          set -e
          sudo timeout 6 opensnoop -x > openx.out 2>&1 &
          BG=$!
          sleep 2
          # читаем заведомо несуществующий файл -> open() вернёт -1 / ENOENT(2)
          cat /etc/cheatsheet_does_not_exist_xyz 2>/dev/null || true
          wait $BG 2>/dev/null || true
          echo "--- вывод opensnoop -x ---"
          cat openx.out
          grep -q "cheatsheet_does_not_exist_xyz" openx.out && echo "[PASS] opensnoop -x поймал ENOENT" \
            || { echo "[FAIL] opensnoop -x не поймал несуществующий файл"; exit 1; }

      # --- 5. opensnoop -d (встроенный таймаут) завершается сам ---
      - name: opensnoop -d завершается по таймеру
        run: |
          set -e
          start=$(date +%s)
          sudo opensnoop -d 3 > opend.out 2>&1 || true
          end=$(date +%s)
          dur=$((end - start))
          echo "opensnoop -d 3 проработал ${dur}с"
          [ "$dur" -ge 2 ] && [ "$dur" -le 8 ] && echo "[PASS] -d отработал как встроенный таймер" \
            || { echo "[FAIL] -d отработал не за ожидаемое время"; exit 1; }

      # --- 6. Bash-пайплайн из карточки 4 (awk $NF | sort | uniq -c) ---
      - name: Пайплайн агрегации путей
        run: |
          set -e
          printf '%s\n' \
            "14097 mysqld -1 2 /etc/my.cnf.d/server.cnf" \
            "2201 nginx -1 2 /var/www/missing.conf" \
            "2201 nginx -1 2 /var/www/missing.conf" > fail.log
          echo "--- топ путей ---"
          out=$(awk '{print $NF}' fail.log | sort | uniq -c | sort -nr | head)
          echo "$out"
          echo "$out" | grep -q "missing.conf" && echo "[PASS] пайплайн агрегации работает" \
            || { echo "[FAIL] пайплайн не дал ожидаемого результата"; exit 1; }

      - name: Итог
        run: echo "Все проверки eBPF-шпаргалки пройдены на живом ядре ✅"
