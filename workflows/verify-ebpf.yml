# ============================================================
  # JOB 4: nftables + conntrack — stateful firewall.
  # ubuntu-latest = одноразовая изолированная VM, policy drop безопасен.
  # ============================================================
  nftables-conntrack:
    runs-on: ubuntu-latest
    steps:
      - name: Установить nftables
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables
          sudo nft --version

      - name: Записать ruleset из шпаргалки
        run: |
          cat > ruleset.nft <<'EOF'
          #!/usr/sbin/nft -f
          flush ruleset
          table ip filter {
            chain INPUT {
              type filter hook input priority 0; policy drop;
              ct state established,related accept
              iifname "lo" accept
              ct state invalid limit rate 3/second log prefix "INVALID input: " drop
              ct state invalid drop
              iifname "eth0" ip saddr 10.10.10.0/24 tcp dport 22 ct state new accept
              iifname "eth0" tcp dport 443 ct state new accept
            }
          }
          EOF
          cat ruleset.nft

      - name: Проверка синтаксиса без применения (nft -c)
        run: |
          set -e
          sudo nft -c -f ruleset.nft
          echo "[PASS] nft -c: синтаксис валиден"

      - name: Применить ruleset реально
        run: |
          set -e
          sudo nft -f ruleset.nft
          echo "[PASS] ruleset применён"

      - name: Проверить правила и порядок limit/log
        run: |
          set -e
          sudo nft list ruleset | tee out.txt
          grep -q 'policy drop' out.txt && echo "[PASS] policy drop"
          grep -q 'ct state established,related accept' out.txt && echo "[PASS] established,related"
          grep -q 'limit rate 3/second' out.txt && echo "[PASS] rate limit"
          grep -q 'tcp dport 22' out.txt && echo "[PASS] SSH"
          grep -q 'tcp dport 443' out.txt && echo "[PASS] HTTPS"
          if grep -E 'invalid.*limit rate.*log prefix' out.txt > /dev/null; then
            echo "[PASS] порядок верный: limit ПЕРЕД log"
          else
            echo "[FAIL] limit должен стоять перед log"; exit 1
          fi

      - name: Очистка
        if: always()
        run: sudo nft flush ruleset || true
