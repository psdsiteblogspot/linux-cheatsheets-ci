name: Verify eBPF cheatsheet (execsnoop / opensnoop)

on:
  push:
  workflow_dispatch:

# Глушим шумные warning'и компилятора BCC, чтобы они не мешали grep по выводу
env:
  BCC_LOGLEVEL: "1"

jobs:
  verify-bcc:
    runs-on: ubuntu-latest

    steps:
      - name: Показать ядро и окружение
        run: |
          uname -a
          grep -E "CONFIG_BPF=y|CONFIG_BPF_SYSCALL=y" /boot/config-$(uname -r) || true

      - name: Установить BCC-инструменты
        run: |
          sudo apt-get update
          sudo apt-get install -y bpfcc-tools linux-headers-$(uname -r)
          sudo ln -sf /usr/sbin/execsnoop-bpfcc /usr/local/bin/execsnoop
          sudo ln -sf /usr/sbin/opensnoop-bpfcc /usr/local/bin/opensnoop
          echo "execsnoop -> $(command -v execsnoop)"
          echo "opensnoop -> $(command -v opensnoop)"

      # Прогрев: первый запуск компилирует eBPF под ядро (может занять 10-30с).
      - name: Прогрев BCC (первая компиляция eBPF)
        run: |
          echo "Первая компиляция BCC под текущее ядро, это долго..."
          sudo timeout 40 opensnoop -d 1 > /dev/null 2>&1 || true
          echo "Прогрев завершён."

      - name: Синтаксис флагов (--help парсится)
        run: |
          set -e
          for tool in execsnoop opensnoop; do
            sudo $tool --help > /dev/null 2>&1 && echo "[OK] $tool --help"
          done

      # execsnoop: 10с на старт, события генерируем В ЦИКЛЕ всё время трассировки
      - name: execsnoop ловит новый процесс
        run: |
          set -e
          sudo timeout 20 execsnoop -t 2> /dev/null 1> exec.out &
          BG=$!
          echo "Ждём старт трассировщика (компиляция eBPF)..."
          sleep 10
          echo "Генерируем процессы..."
          for i in $(seq 1 20); do
            /bin/sleep 0.05
            /usr/bin/env CHEATSHEET=1 /bin/true
          done
          sleep 2
          sudo kill $BG 2>/dev/null || true
          wait $BG 2>/dev/null || true
          echo "--- пойманные строки (фильтр sleep/true/env) ---"
          grep -E "sleep|true|env" exec.out | head -10 || true
          grep -qE "sleep|true|env" exec.out \
            && echo "[PASS] execsnoop поймал процессы" \
            || { echo "[FAIL] execsnoop ничего не поймал"; echo '--- полный вывод ---'; cat exec.out; exit 1; }

      # opensnoop -x: главный пример — ловит ENOENT на несуществующем файле
      - name: opensnoop -x ловит ENOENT
        run: |
          set -e
          sudo timeout 20 opensnoop -x 2> /dev/null 1> openx.out &
          BG=$!
          sleep 10
          echo "Читаем несуществующие файлы..."
          for i in $(seq 1 20); do
            cat /etc/cheatsheet_does_not_exist_xyz 2>/dev/null || true
            sleep 0.05
          done
          sleep 2
          sudo kill $BG 2>/dev/null || true
          wait $BG 2>/dev/null || true
          echo "--- пойманные строки ---"
          grep "cheatsheet_does_not_exist_xyz" openx.out | head -5 || true
          grep -q "cheatsheet_does_not_exist_xyz" openx.out \
            && echo "[PASS] opensnoop -x поймал ENOENT" \
            || { echo "[FAIL] opensnoop -x не поймал файл"; echo '--- полный вывод ---'; cat openx.out; exit 1; }

      # opensnoop -d: встроенный таймер завершает трассировку сам
      - name: opensnoop -d завершается по таймеру
        run: |
          set -e
          start=$(date +%s)
          sudo opensnoop -d 3 > /dev/null 2>&1 || true
          end=$(date +%s)
          dur=$((end - start))
          echo "opensnoop -d 3 проработал ${dur}с"
          [ "$dur" -ge 2 ] && [ "$dur" -le 40 ] \
            && echo "[PASS] -d отработал как встроенный таймер" \
            || { echo "[FAIL] -d отработал не за ожидаемое время"; exit 1; }

      # Bash-пайплайн из карточки 4 (не зависит от ядра)
      - name: Пайплайн агрегации путей (awk NF | sort | uniq -c)
        run: |
          set -e
          printf '%s\n' \
            "14097 mysqld -1 2 /etc/my.cnf.d/server.cnf" \
            "2201 nginx -1 2 /var/www/missing.conf" \
            "2201 nginx -1 2 /var/www/missing.conf" > fail.log
          out=$(awk '{print $NF}' fail.log | sort | uniq -c | sort -nr | head)
          echo "$out"
          echo "$out" | grep -q "missing.conf" \
            && echo "[PASS] пайплайн агрегации работает" \
            || { echo "[FAIL] пайплайн не дал результата"; exit 1; }

      - name: Итог
        run: echo "Проверки eBPF-шпаргалки пройдены на живом ядре."
